<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finalizar Compra — BRUGNERA STORE</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- LIGAÇÃO COM O CSS -->
<link rel="stylesheet" href="checkout.css">

<!-- FIREBASE SCRIPTS -->
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body>

  <!-- CABEÇALHO SIMPLES -->
  <header class="checkout-header">
    <a href="index.html" class="logo">BRUGNERA<span>Store</span></a>
    <div class="secure-badge">🔒 Ambiente Seguro</div>
  </header>

  <div class="checkout-container">
    <!-- DADOS DO CLIENTE E ENTREGA -->
    <div class="checkout-form">
      <h2>Finalizar Pedido</h2>
      
      <div class="form-section">
        <h3>1. Seus Dados</h3>
        <div class="form-group"><label>Nome Completo</label><input type="text" id="cNome" placeholder="Ex: Maria Silva"></div>
        <div class="form-row">
          <div class="form-group"><label>E-mail</label><input type="email" id="cEmail" placeholder="maria@email.com"></div>
          <div class="form-group"><label>WhatsApp</label><input type="text" id="cWhats" placeholder="(00) 00000-0000"></div>
        </div>
      </div>

      <div class="form-section">
        <h3>2. Entrega</h3>
        <div class="form-row">
          <div class="form-group"><label>CEP</label><input type="text" id="cCep" placeholder="00000-000"></div>
          <div class="form-group"><label>Cidade / Estado</label><input type="text" id="cCidade" placeholder="Jaraguá do Sul - SC"></div>
        </div>
        <div class="form-row">
          <div class="form-group" style="flex:2"><label>Rua / Endereço</label><input type="text" id="cRua" placeholder="Nome da rua"></div>
          <div class="form-group" style="flex:1"><label>Número</label><input type="text" id="cNumero" placeholder="123"></div>
        </div>
      </div>

      <div class="form-section">
        <h3>3. Pagamento</h3>
        <div class="payment-options">
          <label class="pay-opt active" onclick="selecionarPagamento('Pix', this)">
            <input type="radio" name="pagamento" checked>
            <span>Pix (5% Off)</span>
          </label>
          <label class="pay-opt" onclick="selecionarPagamento('Cartão de Crédito', this)">
            <input type="radio" name="pagamento">
            <span>Cartão de Crédito</span>
          </label>
        </div>
      </div>

      <button class="btn-primary" id="btnFinalizar" onclick="concluirCompra()">Confirmar Pagamento</button>
      <div style="text-align:center; margin-top:15px;"><a href="index.html" class="back-link">Voltar para a loja</a></div>
    </div>

    <!-- RESUMO DO PEDIDO -->
    <div class="checkout-summary">
      <h3>Resumo do Pedido</h3>
      <div class="summary-items" id="summaryItems">
        <!-- Itens injetados via JS -->
      </div>
      <div class="summary-totals">
        <div class="total-row"><span>Subtotal</span><span id="sumSubtotal">R$ 0,00</span></div>
        <div class="total-row"><span>Frete</span><span style="color:var(--green)">Grátis</span></div>
        <div class="total-row" id="descontoRow" style="color:var(--gold); display:none;"><span>Desconto Pix (5%)</span><span id="sumDesconto">- R$ 0,00</span></div>
        <div class="total-row main"><span>Total</span><span id="sumTotal">R$ 0,00</span></div>
      </div>
    </div>
  </div>

<!-- LIGAÇÃO COM O JS -->
<script src="checkout.js"></script>

</body>
</html>
