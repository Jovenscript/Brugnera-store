<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brugnera Store | Moda Feminina Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- VARIÁVEIS E RESET --- */
        :root {
            --black: #050505;
            --white: #ffffff;
            --gray-light: #f9f9f9;
            --gray-medium: #e0e0e0;
            --gray-dark: #333333;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Lato', sans-serif;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            background-color: var(--white);
            color: var(--black);
            line-height: 1.6;
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        /* --- TIPOGRAFIA & BOTÕES --- */
        h1, h2, h3, h4 { font-family: var(--font-serif); font-weight: 600; }
        
        .btn {
            display: inline-block;
            background-color: var(--black);
            color: var(--white);
            padding: 12px 24px;
            font-family: var(--font-sans);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            border: 1px solid var(--black);
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }

        .btn:hover {
            background-color: var(--white);
            color: var(--black);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--black);
        }

        .btn-outline:hover {
            background-color: var(--black);
            color: var(--white);
        }

        /* --- HEADER & NAVEGAÇÃO --- */
        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--gray-medium);
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.98);
            z-index: 1000;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .logo-title {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .logo-subtitle {
            font-size: 0.7rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--gray-dark);
        }

        .nav-icons {
            display: flex;
            gap: 20px;
            font-size: 1.2rem;
        }

        .nav-icons i { cursor: pointer; transition: var(--transition); }
        .nav-icons i:hover { color: #666; }

        .cart-icon-wrapper { position: relative; }
        .cart-count {
            position: absolute;
            top: -8px;
            right: -10px;
            background: var(--black);
            color: var(--white);
            font-size: 0.65rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- HERO BANNER --- */
        .hero {
            height: 70vh;
            background: url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=2070&auto=format&fit=crop') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--white);
            position: relative;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.4);
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero h1 { font-size: 4rem; margin-bottom: 10px; }
        .hero p { font-size: 1.2rem; margin-bottom: 30px; font-weight: 300; letter-spacing: 1px; }

        /* --- PRODUTOS (GRID) --- */
        .container { padding: 60px 5%; max-width: 1400px; margin: 0 auto; }
        .section-title { text-align: center; font-size: 2.5rem; margin-bottom: 40px; }

        .filters { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .filter-btn {
            background: none; border: none; font-family: var(--font-sans);
            font-size: 0.9rem; text-transform: uppercase; cursor: pointer;
            letter-spacing: 1px; padding-bottom: 5px; color: var(--gray-dark);
        }
        .filter-btn.active { color: var(--black); border-bottom: 1px solid var(--black); }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px;
        }

        .product-card { text-align: center; cursor: pointer; group; }
        .product-img-wrapper {
            position: relative;
            overflow: hidden;
            margin-bottom: 15px;
            background: var(--gray-light);
            aspect-ratio: 3/4;
        }
        .product-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .product-card:hover .product-img-wrapper img { transform: scale(1.05); }
        
        .product-title { font-family: var(--font-serif); font-size: 1.2rem; margin-bottom: 5px; }
        .product-price { font-weight: bold; font-size: 1.1rem; }

        /* --- PÁGINA DO PRODUTO --- */
        .product-detail-view { display: flex; gap: 50px; flex-wrap: wrap; }
        .product-detail-img { flex: 1; min-width: 300px; background: var(--gray-light); }
        .product-detail-img img { width: 100%; height: auto; object-fit: cover; }
        .product-detail-info { flex: 1; min-width: 300px; display: flex; flex-direction: column; justify-content: center; }
        .product-detail-info h2 { font-size: 2.5rem; margin-bottom: 15px; }
        .product-detail-info .price { font-size: 1.8rem; margin-bottom: 20px; }
        .product-detail-info .desc { color: var(--gray-dark); margin-bottom: 30px; font-weight: 300; }
        
        .size-selector { margin-bottom: 30px; }
        .size-selector p { margin-bottom: 10px; font-weight: bold; text-transform: uppercase; font-size: 0.85rem; }
        .sizes { display: flex; gap: 10px; }
        .size-btn { width: 40px; height: 40px; border: 1px solid var(--gray-medium); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition); }
        .size-btn:hover, .size-btn.selected { border-color: var(--black); background: var(--black); color: var(--white); }

        /* --- CARRINHO E CHECKOUT --- */
        .cart-view, .checkout-view { max-width: 800px; margin: 0 auto; }
        .cart-item { display: flex; align-items: center; gap: 20px; padding: 20px 0; border-bottom: 1px solid var(--gray-medium); }
        .cart-item img { width: 80px; height: 100px; object-fit: cover; }
        .cart-item-info { flex: 1; }
        .cart-item-title { font-family: var(--font-serif); font-size: 1.2rem; }
        .cart-item-remove { color: red; cursor: pointer; font-size: 0.85rem; margin-top: 10px; display: inline-block; }
        
        .cart-summary { margin-top: 40px; padding: 30px; background: var(--gray-light); text-align: right; }
        .cart-summary h3 { margin-bottom: 20px; }

        .checkout-form { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
        .form-group { display: flex; flex-direction: column; text-align: left; }
        .form-group label { margin-bottom: 5px; font-weight: bold; font-size: 0.85rem; text-transform: uppercase; }
        .form-group input, .form-group select { padding: 12px; border: 1px solid var(--gray-medium); font-family: var(--font-sans); }
        .payment-methods { display: flex; gap: 20px; margin-bottom: 20px; }

        /* --- ADMIN PANEL --- */
        .admin-view { max-width: 1000px; margin: 0 auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: left; }
        .admin-table th, .admin-table td { padding: 15px; border-bottom: 1px solid var(--gray-medium); }
        .admin-table th { background: var(--gray-light); font-family: var(--font-serif); }
        .admin-table img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        .action-btn { cursor: pointer; padding: 5px 10px; border: none; background: var(--black); color: var(--white); font-size: 0.8rem; }
        .action-btn.delete { background: #d9534f; }

        .admin-form { background: var(--gray-light); padding: 30px; margin-bottom: 40px; display: none; }
        .admin-form.active { display: block; }

        /* --- WHATSAPP --- */
        .whatsapp-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25D366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: transform 0.3s ease;
        }
        .whatsapp-btn:hover { transform: scale(1.1); color: white; }

        /* --- FOOTER --- */
        footer { background: var(--black); color: var(--white); text-align: center; padding: 40px 20px; margin-top: 60px; }
        footer p { font-size: 0.9rem; color: #aaa; }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .product-detail-view { flex-direction: column; }
            .cart-item { flex-direction: column; text-align: center; }
            .admin-table { display: block; overflow-x: auto; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-icons">
            <i class="fa-solid fa-bars" onclick="alert('Menu de categorias será aberto aqui.')"></i>
            <i class="fa-solid fa-magnifying-glass" onclick="alert('Sistema de busca em breve.')"></i>
        </div>

        <div class="logo-container" onclick="navigate('home')">
            <div class="logo-title">Brugnera</div>
            <div class="logo-subtitle">Store</div>
        </div>

        <div class="nav-icons">
            <i class="fa-regular fa-user" onclick="navigate('admin')" title="Área Admin"></i>
            <div class="cart-icon-wrapper" onclick="navigate('cart')">
                <i class="fa-solid fa-bag-shopping"></i>
                <span class="cart-count" id="cart-count-badge">0</span>
            </div>
        </div>
    </header>

    <main id="app"></main>

    <a href="https://wa.me/5511999999999?text=Olá,%20gostaria%20de%20atendimento%20da%20Brugnera%20Store!" target="_blank" class="whatsapp-btn">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <footer>
        <div class="logo-title" style="margin-bottom: 10px;">Brugnera</div>
        <p>&copy; 2026 Brugnera Store. Todos os direitos reservados.</p>
        <p style="margin-top: 10px; font-size: 0.8rem;">Moda Feminina Premium</p>
    </footer>

    <script>
        // --- DADOS INICIAIS (SIMULANDO BANCO DE DADOS) ---
        const initialProducts = [
            { id: 1, name: "Vestido Midi Seda Plissada", price: 389.90, category: "Vestidos", img: "https://images.unsplash.com/photo-1595777457583-95e059d581b8?auto=format&fit=crop&w=600&q=80", desc: "Vestido elegante em seda pura com caimento impecável. Perfeito para eventos sofisticados ou jantares especiais. Decote em V e alças finas reguláveis." },
            { id: 2, name: "Conjunto Alfaiataria Paris", price: 459.00, category: "Conjuntos", img: "https://images.unsplash.com/photo-1594223274512-ad4803739b7c?auto=format&fit=crop&w=600&q=80", desc: "Conjunto composto por blazer acinturado e calça pantalona. Tecido premium que não amassa com facilidade. O verdadeiro luxo minimalista." },
            { id: 3, name: "Blusa Gola Alta Minimal", price: 189.90, category: "Blusas", img: "https://images.unsplash.com/photo-1551794274-12499d3e8e9e?auto=format&fit=crop&w=600&q=80", desc: "Blusa manga longa com gola alta em tecido canelado premium. Ajuste perfeito ao corpo, essencial para o guarda-roupa de inverno." },
            { id: 4, name: "Vestido Longo Noir", price: 529.90, category: "Vestidos", img: "https://images.unsplash.com/photo-1566206091558-4f22ef389dcd?auto=format&fit=crop&w=600&q=80", desc: "O clássico vestido preto elevado a outro nível. Fenda lateral sutil, costas nuas com amarração delicada." },
            { id: 5, name: "Camisa Branca Classic", price: 219.00, category: "Blusas", img: "https://images.unsplash.com/photo-1598554747436-c9293d6a588f?auto=format&fit=crop&w=600&q=80", desc: "A peça mais versátil que você pode ter. Algodão egípcio, corte impecável e botões madrepérola ocultos." },
            { id: 6, name: "Calça Pantalona Areia", price: 279.90, category: "Calças", img: "https://images.unsplash.com/photo-1509631179647-0177331693ae?auto=format&fit=crop&w=600&q=80", desc: "Cintura alta, caimento fluido e elegante. Tecido leve ideal para os dias mais quentes mantendo a sofisticação." }
        ];

        // Inicializar Banco de Dados Falso
        if (!localStorage.getItem('brugnera_products')) {
            localStorage.setItem('brugnera_products', JSON.stringify(initialProducts));
        }
        if (!localStorage.getItem('brugnera_cart')) {
            localStorage.setItem('brugnera_cart', JSON.stringify([]));
        }

        // Funções de Banco de Dados
        const getProducts = () => JSON.parse(localStorage.getItem('brugnera_products'));
        const saveProducts = (products) => localStorage.setItem('brugnera_products', JSON.stringify(products));
        const getCart = () => JSON.parse(localStorage.getItem('brugnera_cart'));
        const saveCart = (cart) => {
            localStorage.setItem('brugnera_cart', JSON.stringify(cart));
            updateCartBadge();
        };

        // Formatação de Moeda
        const formatMoney = (value) => {
            return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        };

        // --- SISTEMA DE ROTEAMENTO (SPA) ---
        const app = document.getElementById('app');

        function navigate(page, id = null) {
            window.scrollTo(0, 0);
            if (page === 'home') renderHome();
            else if (page === 'product') renderProduct(id);
            else if (page === 'cart') renderCart();
            else if (page === 'checkout') renderCheckout();
            else if (page === 'admin') renderAdminLogin();
        }

        // --- RENDERIZADORES DE PÁGINAS ---

        // 1. PÁGINA INICIAL
        function renderHome(filterCategory = 'Todos') {
            const products = getProducts();
            const categories = ['Todos', ...new Set(products.map(p => p.category))];
            
            let filteredProducts = products;
            if (filterCategory !== 'Todos') {
                filteredProducts = products.filter(p => p.category === filterCategory);
            }

            let html = `
                <section class="hero">
                    <div class="hero-content">
                        <h1>Nova Coleção</h1>
                        <p>Elegância e sofisticação em cada detalhe.</p>
                        <button class="btn" onclick="document.getElementById('shop').scrollIntoView({behavior: 'smooth'})">Ver Produtos</button>
                    </div>
                </section>

                <div class="container" id="shop">
                    <h2 class="section-title">Nossas Peças</h2>
                    
                    <div class="filters">
                        ${categories.map(cat => `
                            <button class="filter-btn ${cat === filterCategory ? 'active' : ''}" 
                                onclick="renderHome('${cat}')">${cat}</button>
                        `).join('')}
                    </div>

                    <div class="product-grid">
                        ${filteredProducts.map(product => `
                            <div class="product-card" onclick="navigate('product', ${product.id})">
                                <div class="product-img-wrapper">
                                    <img src="${product.img}" alt="${product.name}">
                                </div>
                                <h3 class="product-title">${product.name}</h3>
                                <p class="product-price">${formatMoney(product.price)}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            app.innerHTML = html;
        }

        // 2. PÁGINA DE PRODUTO
        function renderProduct(id) {
            const product = getProducts().find(p => p.id === id);
            if (!product) return navigate('home');

            app.innerHTML = `
                <div class="container">
                    <div class="product-detail-view">
                        <div class="product-detail-img">
                            <img src="${product.img}" alt="${product.name}">
                        </div>
                        <div class="product-detail-info">
                            <h2>${product.name}</h2>
                            <p class="price">${formatMoney(product.price)}</p>
                            <p class="desc">${product.desc}</p>
                            
                            <div class="size-selector">
                                <p>Tamanho</p>
                                <div class="sizes">
                                    <div class="size-btn" onclick="selectSize(this)">PP</div>
                                    <div class="size-btn" onclick="selectSize(this)">P</div>
                                    <div class="size-btn selected" onclick="selectSize(this)">M</div>
                                    <div class="size-btn" onclick="selectSize(this)">G</div>
                                    <div class="size-btn" onclick="selectSize(this)">GG</div>
                                </div>
                            </div>

                            <button class="btn" onclick="addToCart(${product.id})" style="width: 100%; padding: 15px; font-size: 1rem;">
                                Adicionar à Sacola
                            </button>
                            
                            <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--gray-medium);">
                                <p style="font-size: 0.9rem; margin-bottom: 10px;"><i class="fa-solid fa-truck"></i> Calcule o frete</p>
                                <div style="display: flex; gap: 10px;">
                                    <input type="text" placeholder="00000-000" style="padding: 10px; border: 1px solid #ccc; flex: 1;">
                                    <button class="btn btn-outline" onclick="alert('Frete fixo para o Brasil: R$ 15,00')">Calcular</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        window.selectSize = function(element) {
            document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('selected'));
            element.classList.add('selected');
        }

        // 3. CARRINHO
        window.addToCart = function(productId) {
            const product = getProducts().find(p => p.id === productId);
            const size = document.querySelector('.size-btn.selected').innerText;
            const cart = getCart();
            
            cart.push({ ...product, selectedSize: size, cartId: Date.now() });
            saveCart(cart);
            
            alert('Produto adicionado com sucesso!');
            navigate('cart');
        }

        function renderCart() {
            const cart = getCart();
            let subtotal = cart.reduce((acc, item) => acc + item.price, 0);

            let html = `
                <div class="container cart-view">
                    <h2 class="section-title">Sua Sacola</h2>
            `;

            if (cart.length === 0) {
                html += `
                    <div style="text-align: center; padding: 50px 0;">
                        <p style="margin-bottom: 20px;">Sua sacola está vazia.</p>
                        <button class="btn" onclick="navigate('home')">Continuar Comprando</button>
                    </div>
                `;
            } else {
                html += cart.map(item => `
                    <div class="cart-item">
                        <img src="${item.img}" alt="${item.name}">
                        <div class="cart-item-info">
                            <h3 class="cart-item-title">${item.name}</h3>
                            <p style="color: var(--gray-dark); font-size: 0.9rem;">Tamanho: ${item.selectedSize}</p>
                            <p style="font-weight: bold; margin-top: 10px;">${formatMoney(item.price)}</p>
                            <span class="cart-item-remove" onclick="removeFromCart(${item.cartId})">Remover</span>
                        </div>
                    </div>
                `).join('');

                html += `
                    <div class="cart-summary">
                        <h3>Subtotal: ${formatMoney(subtotal)}</h3>
                        <p style="color: var(--gray-dark); margin-bottom: 20px; font-size: 0.9rem;">Frete calculado no checkout.</p>
                        <button class="btn" onclick="navigate('checkout')" style="width: 100%; padding: 15px;">Finalizar Compra</button>
                    </div>
                `;
            }

            html += `</div>`;
            app.innerHTML = html;
        }

        window.removeFromCart = function(cartId) {
            const cart = getCart().filter(item => item.cartId !== cartId);
            saveCart(cart);
            renderCart();
        }

        // 4. CHECKOUT
        function renderCheckout() {
            const cart = getCart();
            if (cart.length === 0) return navigate('home');
            
            let total = cart.reduce((acc, item) => acc + item.price, 0) + 15; // + 15 de frete fixo

            app.innerHTML = `
                <div class="container checkout-view">
                    <h2 class="section-title">Finalizar Pedido</h2>
                    
                    <div class="checkout-form">
                        <h3>1. Dados de Entrega</h3>
                        <div class="form-group">
                            <label>Nome Completo</label>
                            <input type="text" placeholder="Maria da Silva">
                        </div>
                        <div class="form-group">
                            <label>E-mail</label>
                            <input type="email" placeholder="maria@email.com">
                        </div>
                        <div style="display: flex; gap: 20px;">
                            <div class="form-group" style="flex: 1;">
                                <label>CEP</label>
                                <input type="text" placeholder="00000-000">
                            </div>
                            <div class="form-group" style="flex: 2;">
                                <label>Endereço</label>
                                <input type="text" placeholder="Rua das Flores, 123">
                            </div>
                        </div>

                        <h3 style="margin-top: 20px;">2. Pagamento</h3>
                        <div class="payment-methods">
                            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                                <input type="radio" name="payment" checked> Pix (5% de desconto)
                            </label>
                            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                                <input type="radio" name="payment"> Cartão de Crédito
                            </label>
                        </div>

                        <div class="cart-summary" style="text-align: left; background: var(--black); color: var(--white);">
                            <p>Total dos Produtos: ${formatMoney(total - 15)}</p>
                            <p>Frete (Fixo): R$ 15,00</p>
                            <h2 style="margin-top: 15px; border-top: 1px solid #333; padding-top: 15px;">Total a Pagar: ${formatMoney(total)}</h2>
                            <button class="btn" style="background: var(--white); color: var(--black); width: 100%; margin-top: 20px;" onclick="finishOrder()">Confirmar Pedido</button>
                        </div>
                    </div>
                </div>
            `;
        }

        window.finishOrder = function() {
            alert('Pedido realizado com sucesso! (Esta é uma simulação). Obrigado por comprar na Brugnera Store.');
            saveCart([]); // Limpa o carrinho
            navigate('home');
        }

        // 5. ÁREA ADMINISTRATIVA
        function renderAdminLogin() {
            const pass = prompt('Área Restrita. Digite a senha administrativa (Dica: admin123):');
            if (pass === 'admin123') {
                renderAdminDashboard();
            } else {
                alert('Senha incorreta.');
                navigate('home');
            }
        }

        function renderAdminDashboard() {
            const products = getProducts();
            
            app.innerHTML = `
                <div class="container admin-view">
                    <div class="admin-header">
                        <h2>Painel de Controle</h2>
                        <button class="btn" onclick="toggleAdminForm()">+ Novo Produto</button>
                    </div>

                    <div class="admin-form" id="admin-form">
                        <h3>Cadastrar/Editar Produto</h3>
                        <form onsubmit="saveProductAdmin(event)" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                            <input type="hidden" id="admin-id">
                            <div class="form-group"><label>Nome da Peça</label><input type="text" id="admin-name" required></div>
                            <div class="form-group"><label>Categoria</label><input type="text" id="admin-category" required></div>
                            <div class="form-group"><label>Preço (Ex: 199.90)</label><input type="number" step="0.01" id="admin-price" required></div>
                            <div class="form-group"><label>URL da Imagem</label><input type="text" id="admin-img" required></div>
                            <div class="form-group"><label>Descrição</label><input type="text" id="admin-desc" required></div>
                            <button type="submit" class="btn">Salvar Produto</button>
                        </form>
                    </div>

                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Imagem</th>
                                <th>Nome</th>
                                <th>Categoria</th>
                                <th>Preço</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${products.map(p => `
                                <tr>
                                    <td><img src="${p.img}" alt="${p.name}"></td>
                                    <td>${p.name}</td>
                                    <td>${p.category}</td>
                                    <td>${formatMoney(p.price)}</td>
                                    <td>
                                        <button class="action-btn delete" onclick="deleteProductAdmin(${p.id})">Excluir</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <button class="btn btn-outline" style="margin-top: 30px;" onclick="navigate('home')">Sair do Painel</button>
                </div>
            `;
        }

        window.toggleAdminForm = function() {
            document.getElementById('admin-form').classList.toggle('active');
        }

        window.saveProductAdmin = function(e) {
            e.preventDefault();
            const products = getProducts();
            
            const newProduct = {
                id: Date.now(), // Gera um ID único
                name: document.getElementById('admin-name').value,
                category: document.getElementById('admin-category').value,
                price: parseFloat(document.getElementById('admin-price').value),
                img: document.getElementById('admin-img').value,
                desc: document.getElementById('admin-desc').value
            };

            products.push(newProduct);
            saveProducts(products);
            alert('Produto salvo com sucesso!');
            renderAdminDashboard();
        }

        window.deleteProductAdmin = function(id) {
            if(confirm('Tem certeza que deseja excluir esta peça?')) {
                let products = getProducts();
                products = products.filter(p => p.id !== id);
                saveProducts(products);
                renderAdminDashboard();
            }
        }

        // --- UTILITÁRIOS ---
        function updateCartBadge() {
            const cart = getCart();
            document.getElementById('cart-count-badge').innerText = cart.length;
        }

        // Inicialização
        updateCartBadge();
        navigate('home');

    </script>
</body>
</html>
